# Tier â†’ model mapping (optional override).
#
# Agentum does NOT manage credentials or provider configuration. You install and
# configure opencode / claude-code / etc. yourself â€” its providers, base URLs,
# and API keys live in the agent binary's own config. Agentum only maps a tier
# name to the model string it passes via --model.
#
# This file is OPTIONAL. Without it, Agentum uses the built-in defaults:
#   opencode:    fastâ†’anthropic/claude-haiku, strongâ†’anthropic/claude-sonnet,
#                reasoningâ†’anthropic/claude-opus
#   claude-code: fastâ†’haiku, strongâ†’sonnet, reasoningâ†’opus
#
# Copy to models.yaml (gitignored) ONLY to override those defaults â€” e.g. when
# your agent is configured for a different provider and you want tier names to
# resolve to your models. See docs/models.md.

tiers:
  # Use any model string your agent binary understands. With z.ai configured in
  # your agent, "reasoning" can point at a GLM model; the agent resolves it.
  fast: anthropic/claude-haiku
  strong: anthropic/claude-sonnet
  reasoning: zai/glm-5.2

# Default tier when a pack/stage doesn't name one.
default: strong
