version: "2"

sql:
  - schema: "internal/store/migrations"
    queries: "internal/store/queries"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/store/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          # IDs and seam columns are uuid in Postgres but handled as strings
          # throughout the Go layer (config, authz, engine).
          - db_type: "uuid"
            go_type: "string"
          - db_type: "uuid"
            nullable: true
            go_type: "string"
