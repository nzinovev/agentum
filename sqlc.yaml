version: "2"

sql:
  - schema: "internal/store/migrations"
    queries: "internal/store/queries"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/store/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          # IDs and seam columns are uuid in Postgres but handled as strings
          # throughout the Go layer (config, authz, engine).
          - db_type: "uuid"
            go_type: "string"
          # Nullable uuid columns (resume_of, source_task_id, events.task_id) are
          # genuinely nullable, so they map to sql.NullString (Valid=false → NULL).
          # A plain string here can't represent NULL and breaks inserts on the
          # common empty case (e.g. a fresh invocation has no resume_of).
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "database/sql"
              type: "NullString"
          - db_type: "uuid"
            nullable: true
            go_type: "string"
