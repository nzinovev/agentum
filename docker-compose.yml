services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentum
      POSTGRES_PASSWORD: agentum
      POSTGRES_DB: agentum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentum -d agentum"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
